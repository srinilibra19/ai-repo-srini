# =============================================================================
# application-local.yml — Spring Boot local development profile
#
# Activated automatically when the application is started with:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
# Points all connections to the Docker Compose stack defined in local-dev/.
# All credentials here are local-dev test values ONLY.
# In staging/prod all secrets come from AWS Secrets Manager via ESO — never
# from config files.
#
# SECURITY NOTE — ${VAR:default} patterns below are LOCAL DEV ONLY.
# The defaults MUST NOT appear in application-aws.yml. In staging/prod:
#   HERMES_DB_PASSWORD  → ESO: secrets/hermes/{env}/rds
#   SOLACE_PASSWORD     → ESO: secrets/hermes/{env}/solace
#   KEYSTORE_PASSWORD   → ESO: secrets/hermes/{env}/certs
#   TRUSTSTORE_PASSWORD → ESO: secrets/hermes/{env}/certs
#   AWS credentials     → IRSA (no explicit key/secret — DefaultCredentialsProvider)
#
# Prerequisites (run once before starting the app):
#   cd local-dev && docker compose up -d
#   ./local-dev/certs/generate-certs.sh
# =============================================================================

spring:
  config:
    activate:
      on-profile: local

  # ---------------------------------------------------------------------------
  # DataSource — local PostgreSQL container (hermes-postgres)
  # Flyway picks this up automatically from the DataSource bean.
  # ---------------------------------------------------------------------------
  datasource:
    # sslmode=prefer: upgrades to SSL if the server supports it (local container
    # does not enforce SSL, but a real RDS endpoint will). Use sslmode=require
    # in application-aws.yml. Never omit sslmode — plaintext is the JDBC default.
    url: jdbc:postgresql://localhost:5432/hermes?sslmode=prefer
    username: hermes
    password: ${HERMES_DB_PASSWORD:hermes}   # local dev default — prod reads from Secrets Manager
    hikari:
      pool-name: HermesLocalPool
      maximum-pool-size: 5   # keep low for local dev
      minimum-idle: 1
      connection-timeout: 5000
      idle-timeout: 300000

  # ---------------------------------------------------------------------------
  # Flyway — schema migrations run on startup
  # Migration scripts: src/main/resources/db/migration/V*.sql
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false

# =============================================================================
# Solace PubSub+ — local Docker Compose container (hermes-solace)
#
# Uses mTLS over port 55443.  Certificates are generated by:
#   ./local-dev/certs/generate-certs.sh
#
# Passwords default to 'changeit' (the default in generate-certs.sh).
# Override via environment variables KEYSTORE_PASSWORD / TRUSTSTORE_PASSWORD,
# or set them in local-dev/.env before running generate-certs.sh.
#
# The cert directory is resolved from ${user.dir} (the Maven working
# directory = project root) so the path is correct regardless of the OS or
# where the developer cloned the repo.
# =============================================================================
solace:
  java:
    host: "tcps://localhost:55443"
    msg-vpn: default
    client-username: admin
    client-password: ${SOLACE_PASSWORD:admin}   # local dev default — docker-compose admin user
    # Destination-scoped name prevents session takeover when multiple developers run
    # simultaneously against the same local VPN. Production overrides to
    # aws-hermes-{destination}-{pod-uid} via POD_UID env var (see SolaceConfig.java).
    client-name: "hermes-flightschedules-local-${HOSTNAME:dev}"

    # mTLS — client must authenticate with a certificate, not just username+password.
    # Without this the JCSMP session uses basic auth over TLS even when a keystore
    # is present; the client certificate is never presented to the broker.
    authentication-scheme: CLIENT_CERTIFICATE

    # Reconnection — infinite retries required by CLAUDE.md; never set finite
    reconnect-retries: -1
    reconnect-retry-wait-in-millis: 3000
    connect-retries: 0
    connect-retries-per-host: 0

    # Flow receiver — prefetch window (CLAUDE.md: must be 32)
    sub-ack-window-size: 32

    # ---------------------------------------------------------------------------
    # mTLS — trust store (validates Solace server cert against local CA)
    #         key store  (presents client cert to Solace for mutual auth)
    #
    # LOCAL PROFILE: paths resolve from ${user.dir} (Maven working directory).
    # AWS PROFILE:   these paths are replaced with K8s Secret volume mounts:
    #                  ssl-trust-store: /mnt/certs/truststore.jks
    #                  ssl-key-store:   /mnt/certs/client-keystore.p12
    #                populated by ESO ExternalSecret → K8s Secret → volumeMount
    #                (see helm/hermes/templates/externalsecret.yaml).
    # ---------------------------------------------------------------------------
    ssl-validate-certificate: true
    ssl-trust-store: "${user.dir}/local-dev/certs/truststore.jks"
    ssl-trust-store-password: "${TRUSTSTORE_PASSWORD:changeit}"
    ssl-trust-store-format: JKS
    ssl-key-store: "${user.dir}/local-dev/certs/client-keystore.p12"
    ssl-key-store-password: "${KEYSTORE_PASSWORD:changeit}"
    ssl-key-store-format: PKCS12

# =============================================================================
# AWS — LocalStack (hermes-localstack on localhost:4566)
#
# These properties are read by AwsConfig.java to build the SNS, SQS, and S3
# client beans.  The endpoint-override switches the SDK away from real AWS.
#
# Credentials test/test are dummy values accepted by LocalStack.
# LocalStack default account ID is 000000000000.
#
# IRSA / credential provider design (implemented in AwsConfig.java):
#   AwsConfig checks whether hermes.aws.credentials.access-key-id is non-blank.
#   If present → StaticCredentialsProvider (local dev / LocalStack only).
#   If absent  → DefaultCredentialsProvider (IRSA on ROSA, instance role on EC2).
#   application-aws.yml must NOT define hermes.aws.credentials.* so that the
#   Default Credential Provider Chain / IRSA is always used in staging and prod.
#
# WARNING: endpoint-override routes the entire AWS SDK away from real AWS.
#   This property must NOT appear in application-aws.yml or any staging/prod env.
#   AwsConfig.java applies it only when the value is non-blank, and logs a WARN.
# =============================================================================
hermes:
  aws:
    region: us-east-1
    endpoint-override: http://localhost:4566
    credentials:
      access-key-id: ${AWS_ACCESS_KEY_ID:test}         # LocalStack dummy — not a real AWS credential
      secret-access-key: ${AWS_SECRET_ACCESS_KEY:test} # LocalStack dummy — not a real AWS credential

  sns:
    # ARN format: arn:aws:sns:{region}:{account-id}:{topic-name}
    flightschedules-topic-arn: arn:aws:sns:us-east-1:000000000000:hermes-flightschedules.fifo

  sqs:
    # Poller reads from the consumer queue; DLQ is written to on exhausted retries
    flightschedules-queue-url: http://localhost:4566/000000000000/hermes-flightschedules-consumer-a.fifo
    flightschedules-dlq-url: http://localhost:4566/000000000000/hermes-flightschedules-dlq.fifo

  s3:
    # Claim-check bucket for messages > 200 KB (see ClaimCheckHandler.java)
    claim-check-bucket: hermes-claim-check-local

# =============================================================================
# Logging — increase verbosity for local development
# Structured JSON encoding is configured in logback-spring.xml (all profiles).
# These overrides raise the Hermes package to DEBUG so the full message
# lifecycle is visible in the local console.
# =============================================================================
logging:
  level:
    com.middleware.hermes: DEBUG
    com.solacesystems.jcsmp: INFO
    software.amazon.awssdk: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
    # Suppress Spring's condition evaluation report and @ConfigurationProperties
    # binding trace — both can print bound property values (including passwords)
    # at DEBUG level during startup.
    org.springframework.boot.context.properties: WARN
    org.springframework.boot.autoconfigure.condition: WARN
